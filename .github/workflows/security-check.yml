name: "Security and Dependency Check"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 0"

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write
  issues: write

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/dependency-check-data
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run dependency vulnerability scan
        run: ./gradlew dependencyCheckAnalyze --no-daemon --stacktrace --no-configuration-cache
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload dependency check results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dependency-check-report
          path: |
            build/reports/dependency-check-report.html
            build/reports/dependency-check-report.xml
            build/reports/dependency-check-report.json
            build/reports/dependency-check-report.sarif
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('build/reports/dependency-check-report.sarif') != ''
        with:
          sarif_file: build/reports/dependency-check-report.sarif

      - name: Comment on PR with security results
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = 'build/reports/dependency-check-report.json';

            if (!fs.existsSync(path)) {
              return;
            }

            const report = JSON.parse(fs.readFileSync(path, 'utf8'));
            const vulnerabilities = report.dependencies?.filter(dep =>
              dep.vulnerabilities && dep.vulnerabilities.length > 0
            ) || [];

            let comment = '## Security Scan Results\n\n';

            if (vulnerabilities.length === 0) {
              comment += 'No security vulnerabilities detected in dependencies.\n';
            } else {
              comment += `Found ${vulnerabilities.length} dependencies with security vulnerabilities:\n\n`;
              vulnerabilities.slice(0, 5).forEach(dep => {
                comment += `- **${dep.fileName}**: ${dep.vulnerabilities.length} vulnerability(ies)\n`;
              });
              if (vulnerabilities.length > 5) {
                comment += `- ... and ${vulnerabilities.length - 5} more\n`;
              }
              comment += '\nCheck the workflow artifacts for the full report.\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  gradle-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Check for outdated dependencies
        run: ./gradlew dependencyUpdates --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload dependency updates report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dependency-updates-report
          path: build/dependencyUpdates/
          retention-days: 30
          if-no-files-found: ignore
